name: Security Audit

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        # RUSTSEC-2024-0436: `paste` crate is unmaintained (informational, not a CVE).
        # Reaches us transitively through tract-onnx; we cannot remove it until
        # tract-onnx upgrades. Re-evaluate when tract-onnx > 0.22 is released.
        run: cargo audit --ignore RUSTSEC-2024-0436
