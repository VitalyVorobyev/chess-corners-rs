name: ci

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        toolchain: [stable, nightly]

    # Override rust-toolchain.toml (which pins nightly for local dev) so the
    # matrix cells actually test the intended channel. Without this, the
    # toolchain file silently shadows the matrix entry — and on macos-latest
    # (Homebrew rustup with self-update disabled) the resulting auto-install
    # of the missing nightly toolchain fails with a `rustup-init` usage error.
    env:
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.10 (PyO3)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Add rustfmt (stable runs the fmt gate)
        if: matrix.toolchain == 'stable'
        run: rustup component add rustfmt

      - name: Add clippy (nightly runs the clippy gate)
        if: matrix.toolchain == 'nightly'
        run: rustup component add clippy

      - name: check documented crate versions
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        run: python3 tools/check_doc_versions.py

      - name: fmt
        if: matrix.toolchain == 'stable'
        run: cargo fmt --all --check

      - name: clippy
        # `--all-features` enables the `simd` feature, which gates on
        # `#![feature(portable_simd)]` and therefore requires nightly.
        if: matrix.toolchain == 'nightly'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: test (default features)
        run: cargo test --workspace

      - name: test (tracing feature)
        if: matrix.toolchain == 'stable'
        run: cargo test --workspace --features tracing

      - name: test (ml-refiner feature)
        if: matrix.toolchain == 'stable'
        run: cargo test --workspace --features ml-refiner

      - name: test chess-core feature matrix (no simd)
        if: matrix.toolchain == 'stable'
        run: |
          cargo test -p chess-corners-core --tests
          cargo test -p chess-corners-core --tests --features rayon

      - name: test chess-core feature matrix (simd)
        if: matrix.toolchain == 'nightly'
        run: |
          cargo test -p chess-corners-core --tests --no-default-features --features "std,simd"
          cargo test -p chess-corners-core --tests --no-default-features --features "std,rayon,simd"

      - name: test chess facade feature matrix (no simd)
        if: matrix.toolchain == 'stable'
        run: |
          cargo test -p chess-corners --lib --no-default-features
          cargo test -p chess-corners --lib --no-default-features --features rayon

      - name: test chess facade feature matrix (simd)
        if: matrix.toolchain == 'nightly'
        run: |
          cargo test -p chess-corners --lib --no-default-features --features simd
          cargo test -p chess-corners --lib --no-default-features --features "simd,rayon"

  msrv:
    name: MSRV check (Rust 1.88)
    runs-on: ubuntu-latest

    # Override rust-toolchain.toml so the MSRV gate actually exercises Rust
    # 1.88 instead of falling back to the nightly channel pinned for local dev.
    env:
      RUSTUP_TOOLCHAIN: "1.88"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build (no-default-features + rayon)
        # Verifies the declared MSRV (rust-version = "1.88" in workspace Cargo.toml).
        # The `simd` feature requires nightly, so it is excluded here.
        run: cargo build --workspace --no-default-features --features rayon

  python-build-smoke:
    name: Build wheel smoke test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Builds a manylinux wheel into ./dist
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >-
            --release
            -m crates/chess-corners-py/Cargo.toml
            --out dist
            -i python3.10
          manylinux: 2014

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install wheel and import
        run: |
          python -m pip install -U pip
          python -m pip install --no-index --find-links dist chess_corners
          python -c "import chess_corners; print('ok', chess_corners.__doc__)"

  wasm-build-smoke:
    name: Build WASM smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: wasm-pack build crates/chess-corners-wasm --target web --release

      - name: Verify package output
        run: |
          test -f crates/chess-corners-wasm/pkg/chess_corners_wasm.js
          test -f crates/chess-corners-wasm/pkg/chess_corners_wasm_bg.wasm
          test -f crates/chess-corners-wasm/pkg/chess_corners_wasm.d.ts
          echo "WASM package built successfully"
          ls -lh crates/chess-corners-wasm/pkg/chess_corners_wasm_bg.wasm
