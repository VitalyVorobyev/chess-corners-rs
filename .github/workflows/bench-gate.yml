name: bench-gate

# Benchmark-regression gate (PERF-08). Fails a PR when a gated microbench's
# median regresses more than the budget (default 2%).
#
# NOISE MODEL -- why this is structured the way it is:
#   A 2% budget is far below the run-to-run variance of GitHub-hosted runners
#   (different CPU models, noisy neighbours, frequency scaling: routinely
#   10-30%). Comparing a committed absolute number against a fresh run would be
#   permanently red/green at random. Instead this job measures BOTH sides on
#   THE SAME runner, back-to-back:
#       1. PR head (the checked-out merge commit) -> Criterion baseline "pr"
#       2. the PR's merge-base with main          -> Criterion baseline "base"
#   then compares pr-vs-base. Same physical CPU cancels the machine-model and
#   most steady-state-frequency variance; the curated gated subset (see
#   tools/perf/gated-benches.json) was chosen so the residual sampling/thermal
#   noise stays under 2%.
#
# TOOLCHAIN: nightly + `--features simd` -- the workspace's supported high-perf
#   path (the SIMD kernels gate on nightly `portable_simd`). The pyramid crate
#   has no simd feature and is benched single-threaded for stability.
#
# This file is intentionally SEPARATE from ci.yml so it never conflicts with a
# parallel semver-checks job and can be tuned independently.

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: bench-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bench-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (full history so the merge-base is reachable)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Select nightly toolchain
        run: rustup override set nightly

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: true

      - name: Cache critcmp binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/critcmp
          key: critcmp-0.1.8-${{ runner.os }}

      - name: Install critcmp
        # No-op when the cached binary is already present at this version.
        run: cargo install critcmp --version 0.1.8 --locked

      - name: Run gate (PR head vs merge-base, same runner)
        # ADVISORY on shared GitHub-hosted runners: observed ±13% run-to-run
        # variance on identical code (e.g. radon_response/640x480_up1 at
        # −13.65%, chess_response_kernel/256x256 at +2.37% same-runner no-change
        # runs) makes a hard 2% block permanently unreliable on free runners.
        # The gate reports drift but does NOT block the PR until this job is
        # moved to a dedicated or self-hosted runner — at that point drop
        # continue-on-error to make it blocking.
        continue-on-error: true
        run: |
          set -euo pipefail

          # Copy the gate tooling OUT of the work tree so that checking out an
          # older merge-base (which may predate this gate) cannot clobber it.
          GATE_DIR="${RUNNER_TEMP}/gate"
          cp -r tools/perf "${GATE_DIR}"
          GATE="python3 ${GATE_DIR}/gate.py"

          HEAD_SHA="$(git rev-parse HEAD)"
          git fetch --no-tags origin main
          MERGE_BASE="$(git merge-base "${HEAD_SHA}" FETCH_HEAD)"
          echo "PR head:     ${HEAD_SHA}"
          echo "merge-base:  ${MERGE_BASE}"

          # 1) PR head -> baseline "pr" (strict: a missing/broken target here is
          #    a real config error on the PR side).
          echo "::group::bench PR head -> pr"
          ${GATE} run pr --strict
          echo "::endgroup::"

          # 2) merge-base sources -> baseline "base" (lenient: an older base may
          #    legitimately lack a bench that HEAD added; `check` skips it).
          #    target/criterion is gitignored, so the "pr" results survive the
          #    checkout.
          echo "::group::bench merge-base -> base"
          git checkout --force "${MERGE_BASE}"
          ${GATE} run base
          git checkout --force "${HEAD_SHA}"
          echo "::endgroup::"

          # 3) Compare medians; non-zero exit on any >budget regression.
          ${GATE} check base pr | tee "${RUNNER_TEMP}/bench-gate-report.txt"

      - name: Upload comparison report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-gate-report
          path: ${{ runner.temp }}/bench-gate-report.txt
          if-no-files-found: ignore
