# ML refiner training dataset — v5.
#
# Replaces the v2/v3/v4 tanh-saddle renderer with AA-rasterised hard
# cells, so the training distribution matches the chessboard fixture
# that `crates/chess-corners/tests/refiner_benchmark.rs` evaluates
# against (see docs/proposal-ml-refiner-v3.md for the full rationale).
#
# Key differences from v2:
#   - render_mode: hard_cells (new), instead of the tanh saddle.
#   - cell_size_px is a first-class sampled axis in [4.0, 12.0], so
#     the model sees periodic structure at the same scale range it
#     will meet at inference time.
#   - Tightened dx/dy to [-0.6, 0.6] — ChESS seeds land within
#     ±0.5 px of the true corner, so [-1.5, 1.5] over-sampled
#     offsets the refiner never sees in production.
#   - Blur sigma bumped down to [0.3, 2.0] to match real camera MTF.
#   - Relaxed homography to match real board perspective (less
#     extreme) per the retrain plan.
#   - super_res bumped from 4 → 8 to match the benchmark renderer.

seed: 42
patch_size: 21
num_samples: 200000
shard_size: 20000

render_mode: hard_cells

# Cell-size axis in patch pixels. The benchmark uses 5 and 8; this
# range brackets that with headroom.
cell_size_px: [4.0, 12.0]

# Sub-pixel offset ranges. ChESS seeds are rounded to integer pixels
# of the true corner, so [-0.6, 0.6] covers the inference distribution
# (half-pixel + 0.1 slack) without wasting capacity on unreachable
# offsets.
dx_range: [-0.6, 0.6]
dy_range: [-0.6, 0.6]

# Full-range cell orientation; mod-π symmetry handled by the
# downstream loss.
rotation: [0.0, 6.2831853]

# Unused in hard_cells mode but kept for config compatibility.
scale: [0.7, 1.3]
edge_softness: 0.0

noise_sigma: [0.0, 10.0]
blur_sigma: [0.3, 2.0]
contrast: [0.5, 1.5]
brightness: [-20.0, 20.0]
gamma: [0.7, 1.4]

super_res: 8
render_margin: 2.0

conf_params:
  a: 0.3
  b: 0.01

homography:
  enabled: true
  p_range: [-0.0015, 0.0015]
  shear_range: [-0.1, 0.1]
  scale_x: [0.85, 1.15]
  scale_y: [0.85, 1.15]
  tx_range: [-0.6, 0.6]
  ty_range: [-0.6, 0.6]
  max_local_scale: 1.8
  min_local_scale: 0.55
  max_skew: 0.6
  max_outside_frac: 0.05
  max_attempts: 50

neg:
  enabled: true
  fraction: 0.20
  types: ["flat", "edge", "stripe", "blob", "noise", "near_corner"]
  near_corner_prob: 0.3
  conf_negative: 0.0
