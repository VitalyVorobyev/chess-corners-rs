# Held-out validation set for v5 model selection.
#
# Uses the same hard-cell renderer as synth_v5 but pins the cell size
# to {5, 8} px — the two cell sizes the Rust refiner benchmark runs.
# This val split is what `train.py` uses for `save_best`, so the
# model is selected on the distribution it needs to ship on.
# Negatives disabled — the val metric is per-pixel regression only.

seed: 0xC0FFEE  # Disjoint seed from synth_v5 training.
patch_size: 21
num_samples: 20000
shard_size: 5000

render_mode: hard_cells

# Only the two benchmark cell sizes. Seeding with a narrow uniform
# range lets the dataset class still emit float32 without branching.
cell_size_px: [5.0, 8.0]

dx_range: [-0.6, 0.6]
dy_range: [-0.6, 0.6]
rotation: [0.0, 6.2831853]

scale: [0.7, 1.3]
edge_softness: 0.0

# Tighter augmentations than training — we want reproducible val
# metrics, not the full training envelope.
noise_sigma: [0.0, 10.0]
blur_sigma: [0.3, 2.0]
contrast: [0.6, 1.4]
brightness: [-15.0, 15.0]
gamma: [0.8, 1.3]

super_res: 8
render_margin: 2.0

conf_params:
  a: 0.3
  b: 0.01

homography:
  enabled: true
  p_range: [-0.0015, 0.0015]
  shear_range: [-0.1, 0.1]
  scale_x: [0.9, 1.1]
  scale_y: [0.9, 1.1]
  tx_range: [-0.5, 0.5]
  ty_range: [-0.5, 0.5]
  max_local_scale: 1.6
  min_local_scale: 0.625
  max_skew: 0.4
  max_outside_frac: 0.05
  max_attempts: 50

neg:
  enabled: false
  fraction: 0.0
  types: []
  near_corner_prob: 0.0
  conf_negative: 0.0
