# ML refiner training dataset — v6.
#
# Mixed-mode training: each sample independently draws either the
# legacy tanh saddle or the AA hard-cell chessboard with equal
# probability. The intent is a single model that handles both the
# benchmark fixture (AA hard cells) AND smoother synthetic corners
# tanh-trained callers may still use.

seed: 42
patch_size: 21
num_samples: 200000
shard_size: 20000

# 50/50 mix per sample. Weights don't need to sum to 1.
render_mode:
  hard_cells: 0.5
  tanh: 0.5

# Only consulted when `hard_cells` is drawn.
cell_size_px: [4.0, 12.0]

# Sub-pixel offset range. ChESS seeds live within ±0.5 px; tanh-only
# callers historically used [-1.5, 1.5], but we bias toward the
# inference distribution to avoid wasting capacity on unreachable
# offsets.
dx_range: [-0.6, 0.6]
dy_range: [-0.6, 0.6]

rotation: [0.0, 6.2831853]

# tanh uses scale + edge_softness; hard-cells ignores them.
scale: [0.7, 1.3]
edge_softness: 0.15

# Shared augmentations.
noise_sigma: [0.0, 10.0]
blur_sigma: [0.3, 2.0]
contrast: [0.5, 1.5]
brightness: [-20.0, 20.0]
gamma: [0.7, 1.4]

super_res: 8
render_margin: 2.0

conf_params:
  a: 0.3
  b: 0.01

homography:
  enabled: true
  p_range: [-0.0015, 0.0015]
  shear_range: [-0.1, 0.1]
  scale_x: [0.85, 1.15]
  scale_y: [0.85, 1.15]
  tx_range: [-0.6, 0.6]
  ty_range: [-0.6, 0.6]
  max_local_scale: 1.8
  min_local_scale: 0.55
  max_skew: 0.6
  max_outside_frac: 0.05
  max_attempts: 50

neg:
  enabled: true
  fraction: 0.20
  types: ["flat", "edge", "stripe", "blob", "noise", "near_corner"]
  near_corner_prob: 0.3
  conf_negative: 0.0
