language = "C"
cpp_compat = true
pragma_once = true
include_guard = "CHESS_CORNERS_FFI_H"
usize_is_size_t = true
sys_includes = ["stddef.h", "stdint.h"]
autogen_warning = "/* Auto-generated by `cargo run -p chess-corners-capi --bin generate-ffi-header --features generate-header`. Do not edit manually. */"

[parse]
parse_deps = false

[export]
item_types = ["constants", "typedefs", "enums", "structs", "opaque", "functions"]
