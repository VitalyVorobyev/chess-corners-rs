[package]
name = "chess-corners-wasm"
version = "0.1.0"
description = "WebAssembly bindings for the ChESS corner detector"
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
chess-corners = { path = "../chess-corners", default-features = false }
chess-corners-core = { path = "../chess-corners-core", default-features = false, features = ["std"] }
wasm-bindgen = "0.2"
js-sys = "0.3"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Os"]
